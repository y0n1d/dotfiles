# Input Configuration
# 输入配置
#
# Configure keyboard, mouse, and other input devices
# 配置键盘、鼠标和其他输入设备

### Input configuration
### 输入配置

# Example configuration:
# 示例配置：
#
#   input type:touchpad {
#       dwt enabled
#       tap enabled
#       natural_scroll enabled
#       middle_emulation enabled
#   }
#
#   input type:keyboard {
#       xkb_layout "eu"
#   }
#
# You can also configure each device individually.
# 您也可以单独配置每个设备。
# Read `man 5 sway-input` for more information about this section.
# 阅读 `man 5 sway-input` 获取此部分的更多信息。

# Keyboard configuration
# 键盘配置
input type:keyboard {
    xkb_capslock disabled
    xkb_numlock enabled
    # 确保键盘可以唤醒显示器
    events enabled
}

# Touchpad roll setting
# 触摸板滚动设置(反向滚动)
input "1267:12624:ELAN0670:00_04F3:3150_Touchpad" {
    natural_scroll enabled
    dwt enabled
    tap enabled
    middle_emulation enabled
    drag_lock disabled
}
