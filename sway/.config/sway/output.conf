# Output Configuration
# 输出配置
#
# Configure display outputs, resolution, position, and wallpaper
# 配置显示器输出、分辨率、位置和壁纸

### Output configuration
### 输出配置

# Default wallpaper (more resolutions are available in /usr/share/backgrounds/sway/)
# 默认壁纸（更多分辨率可在 /usr/share/backgrounds/sway/ 中找到）
#output * bg /usr/share/backgrounds/sway/yuri_1.jpg fill
output * bg /home/<你的用户名>/Pictures/Wallpaper/roxy.jpg fill

# Example configuration:
# 示例配置：
#
#   output HDMI-A-1 resolution 1920x1080 position 1920,0
#
# You can get the names of your outputs by running: swaymsg -t get_outputs
# 您可以通过运行以下命令获取输出名称：swaymsg -t get_outputs

# Scale factor for laptop display
# 笔记本电脑显示器的缩放因子
output eDP-1 scale 1.1

# Hide edge borders with smart gaps
# 使用智能间距隐藏边缘边框
smart_gaps on
hide_edge_borders smart_no_gaps

# Inner gaps between windows
# 窗口之间的内部间距
gaps inner 1

# Default border style
# 默认边框样式
default_border pixel 2
#边框 背景 文字 指示器 子边框
client.focused #FCC6BB #FCC6BB #FCC6BB #FCC6BB #FCC6BB
