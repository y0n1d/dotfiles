# Sway Environment Variables
# This file sets environment variables for Sway session

# Qt applications
exec export QT_QPA_PLATFORM=wayland
exec export QT_WAYLAND_DISABLE_WINDOWDECORATION=1

# SDL applications
exec export SDL_VIDEODRIVER=wayland

# XDG environment
exec export XDG_CURRENT_DESKTOP=sway
exec export XDG_SESSION_DESKTOP=sway
exec export XDG_SESSION_TYPE=wayland

# Java applications
exec export _JAVA_AWT_WM_NONREPARENTING=1

# Input method
exec export GTK_IM_MODULE=ibus
exec export QT_IM_MODULE=ibus
exec export XMODIFIERS=@im=ibus
exec export INPUT_METHOD=ibus
exec export SDL_IM_MODULE=ibus
exec export GLFW_IM_MODULE=ibus